# Checkov — Terraform static analysis for this ROSA Classic module repo.
# Used with `make security-check` (scans examples/, modules/* except rosa-cluster-classic, root *.tf).
# modules/rosa-cluster-classic is excluded in the Makefile: Checkov cannot parse its lifecycle preconditions.
# Prefer inline `#checkov:skip=<CKV_ID>:<reason>` on the flagged resource (see AGENTS.md);
# repo-wide skip entries in this file only as a last resort.
#
# https://www.checkov.io/2.Basics/CLI%20Command%20Reference.html

framework:
  - terraform
compact: true
skip-path:
  # Regex (not glob); anchor to repo root so nested paths (e.g. modules/*/bin) are not skipped.
  - '^\.terraform($|/)'
  - '^bin($|/)'
  - '^\.terraform-docs-cache($|/)'
hard-fail-on:
  - HIGH
  - CRITICAL
